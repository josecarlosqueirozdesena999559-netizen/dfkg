version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: decisoes_postgres
    restart: always
    environment:
      POSTGRES_DB: decisoes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: decisoes_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=decisoes
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DEV_BYPASS_AUTH=true
      - KTOR_ENV=development
    depends_on:
      - db

volumes:
  pgdata:
